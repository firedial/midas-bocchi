server {
    listen 443 ssl;
	server_name ${APP_DOMAIN};

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
}

server {
    listen 443 ssl;
	server_name ${ANALYZE_DOMAIN};

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
}
