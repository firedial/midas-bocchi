on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      is_changed: ${{ steps.check.outputs.is_changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check changed paths
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1)
          echo "is_changed=$(echo "$CHANGED" | grep -q '^haruhi/DockerfileProductionBase' && echo true || echo false)" >> $GITHUB_OUTPUT

  docker:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.is_changed == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/midas-bocchi-haruhi-base:latest
          file: haruhi/DockerfileProductionBase
          platforms: linux/arm64
