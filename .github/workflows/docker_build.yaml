on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      is_changed: ${{ steps.check.outputs.is_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check changed paths
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1)
          echo "is_changed=$(echo "$CHANGED" | grep -q '^${{ inputs.name }}/' && echo true || echo false)" >> $GITHUB_OUTPUT

  docker:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.is_changed == 'true'
    steps:
      - name: Chekcout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        uses: ./.github/actions/next-version
        with:
          image_name: ${{ inputs.name }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/midas-bocchi-${{ inputs.name }}:stag-v${{ steps.version.outputs.version }}
          file: ${{ inputs.name }}/DockerfileProduction
          platforms: linux/arm64
