on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
    outputs:
      next_version:
        description: "Next version number (e.g. 1.2.0)"
        value: ${{ jobs.detect.outputs.next_version }}
      current_version:
        description: "Current version number (e.g. 1.2.0)"
        value: ${{ jobs.detect.outputs.current_version }}
      is_changed:
        description: "Is changed source code"
        value: ${{ jobs.detect.outputs.is_changed }}
      display:
        description: "Display version"
        value: ${{ jobs.detect.outputs.display }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.version.outputs.current_version }}
      next_version: ${{ steps.version.outputs.next_version }}
      is_changed: ${{ steps.check.outputs.is_changed }}
      display: ${{ steps.display.outputs.display }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changed paths
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1)
          echo "is_changed=$(echo "$CHANGED" | grep -q -E '^(haruhi|nagisa)/' && echo true || echo false)" >> $GITHUB_OUTPUT
      - name: Get version
        id: version
        uses: ./.github/actions/next-version
        with:
          image_name: haruhi
      - name: Display version message
        id: display
        run: |
          IS_CHANGED="${{ steps.check.outputs.is_changed }}"
          CURRENT="${{ steps.version.outputs.current_version }}"
          NEXT="${{ steps.version.outputs.next_version }}"
          if [ "$IS_CHANGED" = "true" ]; then
            echo "display=${CURRENT} -> ${NEXT}" >> $GITHUB_OUTPUT
          else
            echo "display=${CURRENT}" >> $GITHUB_OUTPUT
          fi

  nagisa:
    if: needs.detect.outputs.is_changed == 'true'
    runs-on: ubuntu-latest
    needs: detect
    steps:
      - uses: actions/checkout@v4
      - name: elm download
        run: |
          curl -L -o elm.gz https://github.com/elm/compiler/releases/download/0.19.1/binary-for-linux-64-bit.gz
          gunzip elm.gz
          chmod +x elm
          mv elm /usr/local/bin/
      - name: install uglifyjs
        run: sudo apt install -y uglifyjs
      - name: build file
        run: |
          cd nagisa
          elm make src/Main.elm --optimize --output=elm.js
          uglifyjs elm.js --compress "pure_funcs=[F2,F3,F4,F5,F6,F7,F8,F9,A2,A3,A4,A5,A6,A7,A8,A9],pure_getters,keep_fargs=false,unsafe_comps,unsafe" | uglifyjs --mangle --output elm.min.js
          mv elm.min.js main.js
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build_nagisa
          path: nagisa/main.js

  deploy:
    if: needs.detect.outputs.is_changed == 'true'
    runs-on: ubuntu-latest
    needs: [detect, nagisa]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: download nagisa build
        uses: actions/download-artifact@v4
        with:
          name: build_nagisa
      - name: move
        run: mv main.js haruhi/public/main.js
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/midas-bocchi-haruhi:stag-v${{ needs.detect.outputs.next_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/midas-bocchi-haruhi:stag-latest
          file: haruhi/DockerfileProduction
          platforms: linux/arm64
