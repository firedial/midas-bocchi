name: deploy swagger

on:
  workflow_call:
    outputs:
      is_changed:
        description: "Is changed source code"
        value: ${{ jobs.detect.outputs.is_changed }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      is_changed: ${{ steps.check.outputs.is_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check changed paths
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1)
          echo "is_changed=$(echo "$CHANGED" | grep -q '^document/api/' && echo true || echo false)" >> $GITHUB_OUTPUT

  build:
    # if: needs.detect.outputs.is_changed == 'true'
    runs-on: ubuntu-latest
    needs: detect
    steps:
      - name: Chekcout code
        uses: actions/checkout@v4
      - name: Install swagger-cli
        run: npm install -g swagger-cli
      - name: Generate Swagger UI
        uses: Legion2/swagger-ui-action@v1
        with:
          output: swagger-ui
          spec-file: document/api/swagger.yaml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Documents
        uses: actions/upload-pages-artifact@v3
        with:
          path: swagger-ui

  deploy:
    if: needs.detect.outputs.is_changed == 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
