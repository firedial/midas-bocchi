openapi: "3.0.3"

info:
  title: "Midas API"
  version: "1.0.0"

paths:
  "/balances":
    get:
      summary: "収支一覧取得"
      tags: [ "balances" ]
      parameters:
        - name: limit
          in: query
          description: "取得する最大数"
          schema: { type: integer, example: 20 }
        - name: orderby
          in: query
          description: "収支IDによる並び替え (`desc` で降順)"
          schema: { type: string, enum: [ desc ], example: desc }
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Balance"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: "収支登録"
      tags: [ "balances" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewBalance"
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  "/balances/{balanceId}":
    parameters:
      - $ref: "#/components/parameters/balanceId"
    get:
      summary: "収支取得"
      tags: [ "balances" ]
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Balance"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: "収支更新"
      tags: [ "balances" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewBalance"
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      summary: "収支削除"
      tags: [ "balances" ]
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  "/moves/{attributeName}":
    parameters:
      - $ref: "#/components/parameters/moveAttributeName"
    get:
      summary: "移動一覧取得"
      tags: [ "moves" ]
      parameters:
        - name: limit
          in: query
          description: "取得する最大数"
          schema: { type: integer, example: 20 }
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Move"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: "移動登録"
      tags: [ "moves" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewMove"
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  "/moves/{attributeName}/{moveId}":
    parameters:
      - $ref: "#/components/parameters/moveAttributeName"
      - $ref: "#/components/parameters/moveId"
    get:
      summary: "移動取得"
      tags: [ "moves" ]
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Move"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: "移動更新"
      tags: [ "moves" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewMove"
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      summary: "移動削除"
      tags: [ "moves" ]
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  "/templates":
    get:
      summary: "テンプレート一覧取得"
      description: "明細なしで返す"
      tags: [ "templates" ]
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemplateSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: "テンプレート登録"
      tags: [ "templates" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewTemplate"
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  "/templates/{templateId}":
    parameters:
      - $ref: "#/components/parameters/templateId"
    get:
      summary: "テンプレート取得"
      description: "明細付きで返す"
      tags: [ "templates" ]
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: "テンプレート更新"
      description: "明細は全件差し替え"
      tags: [ "templates" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewTemplate"
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      summary: "テンプレート削除"
      tags: [ "templates" ]
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  "/attribute_elements/{attributeName}":
    parameters:
      - $ref: "#/components/parameters/attributeName"
    get:
      summary: "属性要素一覧取得"
      tags: [ "attribute_elements" ]
      parameters:
        - name: isOnlySelectable
          in: query
          description: "`true` のとき priority >= 1 のみ返す"
          schema: { type: string, example: "true" }
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttributeElement"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: "属性要素登録"
      tags: [ "attribute_elements" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewAttributeElement"
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributeElement"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  "/attribute_elements/{attributeName}/{elementId}":
    parameters:
      - $ref: "#/components/parameters/attributeName"
      - $ref: "#/components/parameters/elementId"
    get:
      summary: "属性要素取得"
      tags: [ "attribute_elements" ]
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributeElement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: "属性要素更新"
      tags: [ "attribute_elements" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewAttributeElement"
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributeElement"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  "/attribute_categories/{attributeName}":
    parameters:
      - $ref: "#/components/parameters/attributeName"
    get:
      summary: "属性カテゴリー一覧取得"
      tags: [ "attribute_categories" ]
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttributeCategory"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: "属性カテゴリー登録"
      tags: [ "attribute_categories" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewAttributeCategory"
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributeCategory"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  "/attribute_categories/{attributeName}/{categoryId}":
    parameters:
      - $ref: "#/components/parameters/attributeName"
      - $ref: "#/components/parameters/categoryId"
    get:
      summary: "属性カテゴリー取得"
      tags: [ "attribute_categories" ]
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributeCategory"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: "属性カテゴリー更新"
      tags: [ "attribute_categories" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewAttributeCategory"
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributeCategory"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    balanceId:
      name: balanceId
      required: true
      in: path
      description: 収支ID
      schema: { type: integer, example: 123 }
    moveId:
      name: moveId
      required: true
      in: path
      description: 移動ID
      schema: { type: integer, example: 123 }
    templateId:
      name: templateId
      required: true
      in: path
      description: テンプレートID
      schema: { type: integer, example: 1 }
    elementId:
      name: elementId
      required: true
      in: path
      description: 属性要素ID
      schema: { type: integer, example: 100 }
    categoryId:
      name: categoryId
      required: true
      in: path
      description: カテゴリーID
      schema: { type: integer, example: 32 }
    attributeName:
      name: attributeName
      required: true
      in: path
      description: "対象の属性 (`kind_element` / `purpose_element` / `place_element`)"
      schema:
        type: string
        enum: [ kind_element, purpose_element, place_element ]
        example: place_element
    moveAttributeName:
      name: attributeName
      required: true
      in: path
      description: "対象の属性 (`purposes` / `places`)"
      schema:
        type: string
        enum: [ purposes, places ]
        example: places

  responses:
    Ok:
      description: "Success (no body)"
    BadRequest:
      description: "パラメータ不正"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: "認証エラー"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: "リソースが存在しない"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: "外部キー制約違反"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
          example: "E109"
        message:
          type: string
          example: "field is required"

    # --- Balance ---
    Balance:
      type: object
      properties:
        id:
          type: integer
          example: 123
        amount:
          type: integer
          example: -500
        item:
          type: string
          example: うどん
        kind_element_id:
          type: integer
          example: 2
        purpose_element_id:
          type: integer
          example: 5
        place_element_id:
          type: integer
          example: 6
        date:
          type: string
          example: "2024-10-23"
        group_id:
          type: integer
          example: 10
        kind_element_description:
          type: string
          example: 昼食
        purpose_element_description:
          type: string
          example: 食費
        place_element_description:
          type: string
          example: 財布
    BalanceSummary:
      description: "説明フィールドなし (POST/PUT レスポンス)"
      type: object
      properties:
        id:
          type: integer
          example: 123
        amount:
          type: integer
          example: -500
        item:
          type: string
          example: うどん
        kind_element_id:
          type: integer
          example: 2
        purpose_element_id:
          type: integer
          example: 5
        place_element_id:
          type: integer
          example: 6
        date:
          type: string
          example: "2024-10-23"
        group_id:
          type: integer
          nullable: true
          example: 10
    NewBalance:
      type: object
      required:
        [
          amount,
          item,
          kind_element_id,
          purpose_element_id,
          place_element_id,
          date,
        ]
      properties:
        amount:
          type: integer
          description: "0以外"
          example: -500
        item:
          type: string
          example: うどん
        kind_element_id:
          type: integer
          example: 2
        purpose_element_id:
          type: integer
          example: 5
        place_element_id:
          type: integer
          example: 6
        date:
          type: string
          example: "2024-10-23"
        group_id:
          type: integer
          nullable: true
          description: "グループ先頭以外は既存のgroup_idを指定"
          example: 10

    # --- Move ---
    Move:
      type: object
      properties:
        id:
          type: integer
          example: 123
        amount:
          type: integer
          minimum: 1
          example: 500
        item:
          type: string
          example: チャージ
        before_id:
          type: integer
          example: 2
        after_id:
          type: integer
          example: 5
        date:
          type: string
          example: "2024-10-23"
        group_id:
          type: integer
          example: 10
        before_description:
          type: string
          example: 財布
        after_description:
          type: string
          example: ICカード
    MoveSummary:
      description: "説明フィールドなし (POST/PUT レスポンス)"
      type: object
      properties:
        id:
          type: integer
          example: 123
        amount:
          type: integer
          example: 500
        item:
          type: string
          example: チャージ
        before_id:
          type: integer
          example: 2
        after_id:
          type: integer
          example: 5
        date:
          type: string
          example: "2024-10-23"
        group_id:
          type: integer
          nullable: true
          example: 10
    NewMove:
      type: object
      required: [ amount, item, before_id, after_id, date ]
      properties:
        amount:
          type: integer
          minimum: 1
          example: 500
        item:
          type: string
          example: チャージ
        before_id:
          type: integer
          example: 2
        after_id:
          type: integer
          example: 5
        date:
          type: string
          example: "2024-10-23"
        group_id:
          type: integer
          nullable: true
          description: "グループ先頭以外は既存のgroup_idを指定"
          example: 10

    # --- Template ---
    TemplateSummary:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 日用品
    Template:
      allOf:
        - $ref: "#/components/schemas/TemplateSummary"
        - type: object
          properties:
            details:
              type: array
              items:
                $ref: "#/components/schemas/TemplateDetailItem"
    TemplateDetailItem:
      type: object
      properties:
        seq:
          type: integer
          example: 1
        type:
          type: integer
          description: "1: 収支 / 2: 予算移動 / 3: 場所移動"
          enum: [ 1, 2, 3 ]
          example: 1
        amount:
          type: integer
          description: "移動は0以上、収支は制限なし"
          example: 1000
        item:
          type: string
          example: 日用品
        kind_element_id:
          type: integer
          nullable: true
          description: "type=1 のみ。移動は null"
          example: 2
        purpose_element_id:
          type: integer
          nullable: true
          description: "type=1 のみ"
          example: 3
        place_element_id:
          type: integer
          nullable: true
          description: "type=1 のみ"
          example: 4
        move_before_purpose_id:
          type: integer
          nullable: true
          description: "type=2 のみ"
          example: 2
        move_after_purpose_id:
          type: integer
          nullable: true
          description: "type=2 のみ"
          example: 5
        move_before_place_id:
          type: integer
          nullable: true
          description: "type=3 のみ"
          example: 4
        move_after_place_id:
          type: integer
          nullable: true
          description: "type=3 のみ"
          example: 5
    NewTemplate:
      type: object
      required: [ name, details ]
      properties:
        name:
          type: string
          maxLength: 20
          example: 日用品
        details:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/NewTemplateDetailItem"
    NewTemplateDetailItem:
      type: object
      required: [ type, amount, item ]
      properties:
        type:
          type: integer
          description: "1: 収支 / 2: 予算移動 / 3: 場所移動"
          enum: [ 1, 2, 3 ]
          example: 1
        amount:
          type: integer
          description: "移動は0以上、収支は制限なし"
          example: 1000
        item:
          type: string
          maxLength: 50
          example: 日用品
        kind_element_id:
          type: integer
          nullable: true
          description: "type=1 は必須、type=2,3 は null"
          example: 2
        purpose_element_id:
          type: integer
          nullable: true
          description: "type=1 は必須、それ以外は null"
          example: 3
        place_element_id:
          type: integer
          nullable: true
          description: "type=1 は必須、それ以外は null"
          example: 4
        move_before_purpose_id:
          type: integer
          nullable: true
          description: "type=2 は必須、それ以外は null"
          example: 2
        move_after_purpose_id:
          type: integer
          nullable: true
          description: "type=2 は必須、それ以外は null"
          example: 5
        move_before_place_id:
          type: integer
          nullable: true
          description: "type=3 は必須、それ以外は null"
          example: 4
        move_after_place_id:
          type: integer
          nullable: true
          description: "type=3 は必須、それ以外は null"
          example: 5

    # --- AttributeElement ---
    AttributeElement:
      type: object
      properties:
        id:
          type: integer
          example: 100
        name:
          type: string
          example: lunch
        description:
          type: string
          example: 昼食
        priority:
          type: integer
          example: 10
        category_id:
          type: integer
          example: 32
    NewAttributeElement:
      type: object
      required: [ name, description, priority, category_id ]
      properties:
        name:
          type: string
          example: lunch
        description:
          type: string
          example: 昼食
        priority:
          type: integer
          minimum: 0
          maximum: 100
          example: 10
        category_id:
          type: integer
          example: 32

    # --- AttributeCategory ---
    AttributeCategory:
      type: object
      properties:
        id:
          type: integer
          example: 32
        name:
          type: string
          example: food
        description:
          type: string
          example: 食費
    NewAttributeCategory:
      type: object
      required: [ name, description ]
      properties:
        name:
          type: string
          example: food
        description:
          type: string
          example: 食費
